# compose.yaml
# VictoriaMetrics 集群 + Grafana (Keycloak OIDC) + vmauth (JWT读 / Basic Auth写)
# 环境变量引用 .env 文件
# 参考:
#   - https://github.com/VictoriaMetrics/VictoriaMetrics/blob/master/deployment/docker/compose-vm-cluster.yml
#   - https://docs.victoriametrics.com/guides/grafana-vmauth-openid-configuration/

services:
  # ============================================================
  # Grafana - 可视化面板
  # ============================================================
  grafana:
    image: grafana/grafana:12.4.0
    container_name: grafana-with-keycloak
    restart: unless-stopped
    depends_on:
      - vmauth
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SERVER_ROOT_URL: http://${HOST_IP}:${GRAFANA_PORT:-3001}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASS:-admin}
      # ---------- OIDC ----------
      GF_AUTH_GENERIC_OAUTH_ENABLED: true
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: true
      GF_AUTH_GENERIC_OAUTH_NAME: keycloak
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_CLIENT_SECRET}
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: email
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: username
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: full_name
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email
      GF_AUTH_GENERIC_OAUTH_USE_REFRESH_TOKEN: true
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: http://${HOST_IP}:${KC_PORT:-3002}/realms/${KC_REALM:-grafana}/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://${HOST_IP}:${KC_PORT:-3002}/realms/${KC_REALM:-grafana}/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_API_URL: http://${HOST_IP}:${KC_PORT:-3002}/realms/${KC_REALM:-grafana}/protocol/openid-connect/userinfo
      GF_AUTH_GENERIC_OAUTH_SIGNOUT_REDIRECT_URL: http://${HOST_IP}:${KC_PORT:-3002}/realms/${KC_REALM:-grafana}/protocol/openid-connect/logout?post_logout_redirect_uri=http://${HOST_IP}:${GRAFANA_PORT:-3001}/login
      # 角色映射: role-grafanaAdmin -> GrafanaAdmin, role-admin -> Admin, role-editor -> Editor, 其他 -> Viewer
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: contains(groups[*], 'role-grafanaAdmin') && 'GrafanaAdmin' || contains(groups[*], 'role-admin') && 'Admin' || contains(groups[*], 'role-editor') && 'Editor' || 'Viewer'
    volumes:
      - ./grafana/data:/var/lib/grafana/
      - ./grafana/provisioning:/etc/grafana/provisioning/

  # ============================================================
  # Keycloak - OIDC 身份提供商
  # ============================================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keycloak
    command:
      - start-dev
      - --http-port=3001
    ports:
      - "${KC_PORT:-3001}:3001"
    environment:
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HOSTNAME: http://${HOST_IP}:${KC_PORT:-3001}/
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USER:-admin-temporay}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASS}
    volumes:
      - ./keycloak/data:/opt/keycloak/data

  # ============================================================
  # VictoriaMetrics Cluster - 存储节点
  # ============================================================
  vmstorage-1:
    image: victoriametrics/vmstorage:v1.142.0-cluster
    container_name: vmstorage-1
    restart: unless-stopped
    volumes:
      - ./vmstorage-1/data:/storage
    command:
      - --storageDataPath=/storage

  vmstorage-2:
    image: victoriametrics/vmstorage:v1.142.0-cluster
    container_name: vmstorage-2
    restart: unless-stopped
    volumes:
      - ./vmstorage-2/data:/storage
    command:
      - --storageDataPath=/storage

  # ============================================================
  # VictoriaMetrics Cluster - 写入前端
  # ============================================================
  vminsert-1:
    image: victoriametrics/vminsert:v1.142.0-cluster
    container_name: vminsert-1
    restart: unless-stopped
    depends_on:
      - vmstorage-1
      - vmstorage-2
    volumes:
      - ./vminsert-1/data:/data
    command:
      - --storageNode=vmstorage-1:8400
      - --storageNode=vmstorage-2:8400

  vminsert-2:
    image: victoriametrics/vminsert:v1.142.0-cluster
    container_name: vminsert-2
    restart: unless-stopped
    depends_on:
      - vmstorage-1
      - vmstorage-2
    volumes:
      - ./vminsert-2/data:/data
    command:
      - --storageNode=vmstorage-1:8400
      - --storageNode=vmstorage-2:8400

  # ============================================================
  # VictoriaMetrics Cluster - 查询前端
  # ============================================================
  vmselect-1:
    image: victoriametrics/vmselect:v1.142.0-cluster
    container_name: vmselect-1
    restart: unless-stopped
    depends_on:
      - vmstorage-1
      - vmstorage-2
    volumes:
      - ./vmselect-1/data:/data
    command:
      - --storageNode=vmstorage-1:8401
      - --storageNode=vmstorage-2:8401
      - --vmalert.proxyURL=http://vmalert:8880

  vmselect-2:
    image: victoriametrics/vmselect:v1.142.0-cluster
    container_name: vmselect-2
    restart: unless-stopped
    depends_on:
      - vmstorage-1
      - vmstorage-2
    volumes:
      - ./vmselect-2/data:/data
    command:
      - --storageNode=vmstorage-1:8401
      - --storageNode=vmstorage-2:8401
      - --vmalert.proxyURL=http://vmalert:8880

  # ============================================================
  # vmauth - 统一认证代理（读: JWT/OIDC, 写: Basic Auth）
  # ============================================================
  vmauth:
    image: victoriametrics/vmauth:v1.142.0
    container_name: vmauth
    restart: unless-stopped
    depends_on:
      - vmselect-1
      - vmselect-2
    ports:
      - "${VMAUTH_PORT:-8427}:8427"
    volumes:
      - ./vmauth/auth.yaml:/etc/auth.yaml
      - ./vmauth/data:/data
    command:
      - --auth.config=/etc/auth.yaml

  # ============================================================
  # vmagent - 指标抓取（采集 VM 集群自身指标）
  # ============================================================
  vmagent:
    image: victoriametrics/vmagent:v1.142.0
    container_name: vmagent
    restart: unless-stopped
    depends_on:
      - vmauth
    ports:
      - "${VMAGENT_PORT:-8429}:8429"
    volumes:
      - ./vmagent/scrape.yaml:/etc/vmagent/config.yaml
      - ./vmagent/data:/vmagentdata
    command:
      - --promscrape.config=/etc/vmagent/config.yaml
      - --remoteWrite.url=http://vmauth:8427/insert/api/v1/write
      - --remoteWrite.basicAuth.username=vmadmin
      - --remoteWrite.basicAuth.password=${VMADMIN_PASS:-vmadmin_pass}

  # ============================================================
  # vmalert - 告警规则引擎
  # ============================================================
  vmalert:
    image: victoriametrics/vmalert:v1.142.0
    container_name: vmalert
    restart: unless-stopped
    depends_on:
      - vmauth
    ports:
      - "${VMALERT_PORT:-8880}:8880"
    volumes:
      - ./vmalert/rules:/etc/alerts
      - ./vmalert/data:/data
    command:
      - --datasource.url=http://vmauth:8427/select/0/prometheus
      - --datasource.basicAuth.username=vmadmin
      - --datasource.basicAuth.password=${VMADMIN_PASS:-vmadmin_pass}
      - --remoteRead.url=http://vmauth:8427/select/0/prometheus
      - --remoteRead.basicAuth.username=vmadmin
      - --remoteRead.basicAuth.password=${VMADMIN_PASS:-vmadmin_pass}
      - --remoteWrite.url=http://vmauth:8427/insert/0/prometheus
      - --remoteWrite.basicAuth.username=vmadmin
      - --remoteWrite.basicAuth.password=${VMADMIN_PASS:-vmadmin_pass}
      - --notifier.url=http://alertmanager:9093/
      - --rule=/etc/alerts/*.yml
      - --external.url=http://${HOST_IP}:${GRAFANA_PORT:-3001}

  # ============================================================
  # alertmanager - 告警通知
  # ============================================================
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager-1
    restart: unless-stopped
    # 不暴露外部端口，内部通过 vmalert 访问
    volumes:
      - ./alertmanager/config:/config
    command:
      - --config.file=/config/alertmanager.yml
